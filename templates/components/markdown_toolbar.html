<div class="composer-toolbar" role="toolbar" aria-label="Markdown formatting">
  <button type="button" class="composer-tool" data-md-before="**" data-md-after="**">Bold</button>
  <button type="button" class="composer-tool" data-md-before="*" data-md-after="*">Italic</button>
  <button type="button" class="composer-tool" data-md-action="quote">Quote</button>
  <button type="button" class="composer-tool" data-md-before="`" data-md-after="`">Code</button>
  <button type="button" class="composer-tool" data-md-before="```\n" data-md-after="\n```">Block</button>
  <button type="button" class="composer-tool" data-md-before="[" data-md-after="](https://example.com)">Link</button>
</div>
