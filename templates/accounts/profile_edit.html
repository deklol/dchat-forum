{% extends "base.html" %}
{% block content %}
<section class="form-shell">
  <div class="form-shell-head">
    <p class="eyebrow">Profile</p>
    <h1>Edit Profile</h1>
  </div>
  <form method="post" enctype="multipart/form-data" class="form-grid">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Profile</button>
  </form>
</section>
{% endblock %}
